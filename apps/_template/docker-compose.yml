services:
  backend:
    image: ${APP_IMAGE}
    container_name: ${APP_NAME}
    restart: unless-stopped
    expose:
      - "${APP_INTERNAL_PORT}"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "orchestrator.app-slug=${APP_NAME}"
      - "traefik.enable=true"
      - "traefik.docker.network=vps-container-orchestrator"
      - "traefik.http.routers.${APP_NAME}.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${APP_NAME}.service=${APP_NAME}"
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=${APP_INTERNAL_PORT}"
    networks:
      - shared-network

networks:
  shared-network:
    external: true
    name: vps-container-orchestrator
