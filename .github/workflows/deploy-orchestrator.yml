name: Deploy Orchestrator

on:
  push:
    branches:
      - main
    paths:
      - infrastructure/**
      - scripts/**
      - apps/_template/**
      - .github/workflows/deploy-orchestrator.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: orchestrator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      BASE_DOMAIN: ${{ secrets.BASE_DOMAIN }}
      ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
      METRICS_API_TOKEN: ${{ secrets.METRICS_API_TOKEN }}
      VPS_METRICS_URL: ${{ secrets.VPS_METRICS_URL }}
      CONTROL_PANEL_RESTART_COMMAND: ${{ secrets.CONTROL_PANEL_RESTART_COMMAND }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy through AWS SSM
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "$AWS_REGION" ] || [ -z "$EC2_INSTANCE_ID" ]; then
            printf 'Missing AWS_REGION or EC2_INSTANCE_ID secret.\n'
            exit 1
          fi

          if [ -z "$BASE_DOMAIN" ] || [ -z "$ACME_EMAIL" ]; then
            printf 'Missing BASE_DOMAIN or ACME_EMAIL secret.\n'
            exit 1
          fi

          if [ -z "$VPS_METRICS_URL" ]; then
            VPS_METRICS_URL="https://metrics.${BASE_DOMAIN}/api/v1/stats"
          fi

          encode_secret() {
            local value="$1"

            if [ -n "$value" ]; then
              printf '%s' "$value" | base64 | tr -d '\n'
            fi
          }

          BASE_DOMAIN_B64="$(encode_secret "$BASE_DOMAIN")"
          ACME_EMAIL_B64="$(encode_secret "$ACME_EMAIL")"
          METRICS_API_TOKEN_B64=""
          VPS_METRICS_URL_B64="$(encode_secret "$VPS_METRICS_URL")"
          CONTROL_PANEL_RESTART_COMMAND_B64=""

          if [ -n "$METRICS_API_TOKEN" ]; then
            METRICS_API_TOKEN_B64="$(encode_secret "$METRICS_API_TOKEN")"
          fi

          if [ -n "$CONTROL_PANEL_RESTART_COMMAND" ]; then
            CONTROL_PANEL_RESTART_COMMAND_B64="$(encode_secret "$CONTROL_PANEL_RESTART_COMMAND")"
          fi

          SSM_PARAMETERS="$(cat <<JSON
          {
            "commands": [
              "set -eu",
              "if [ -d /home/ubuntu/deploy-hub ]; then DEPLOY_DIR=/home/ubuntu/deploy-hub; DEPLOY_USER=ubuntu; elif [ -d /home/ec2-user/deploy-hub ]; then DEPLOY_DIR=/home/ec2-user/deploy-hub; DEPLOY_USER=ec2-user; else echo Missing deploy-hub directory under /home/ubuntu or /home/ec2-user; exit 1; fi",
              "if [ ! -d \"$DEPLOY_DIR/.git\" ]; then echo Missing git repo at $DEPLOY_DIR; exit 1; fi",
              "su - \"$DEPLOY_USER\" -c \"cd \\\"$DEPLOY_DIR\\\" && git fetch origin main && git checkout main && git pull --ff-only origin main\"",
              "if [ ! -f \"$DEPLOY_DIR/infrastructure/.env\" ]; then cp \"$DEPLOY_DIR/infrastructure/.env.example\" \"$DEPLOY_DIR/infrastructure/.env\" && chown \"$DEPLOY_USER\":\"$DEPLOY_USER\" \"$DEPLOY_DIR/infrastructure/.env\"; fi",
              "BASE_DOMAIN_VALUE=\$(printf '%s' '$BASE_DOMAIN_B64' | base64 -d); ACME_EMAIL_VALUE=\$(printf '%s' '$ACME_EMAIL_B64' | base64 -d); su - \"$DEPLOY_USER\" -c \"bash \\\"$DEPLOY_DIR/scripts/upsert-env.sh\\\" \\\"$DEPLOY_DIR/infrastructure/.env\\\" BASE_DOMAIN \\\"\$BASE_DOMAIN_VALUE\\\" && bash \\\"$DEPLOY_DIR/scripts/upsert-env.sh\\\" \\\"$DEPLOY_DIR/infrastructure/.env\\\" ACME_EMAIL \\\"\$ACME_EMAIL_VALUE\\\"\"",
              "if [ -n \"$METRICS_API_TOKEN_B64\" ]; then METRICS_API_TOKEN_VALUE=\$(printf '%s' '$METRICS_API_TOKEN_B64' | base64 -d); su - \"$DEPLOY_USER\" -c \"bash \\\"$DEPLOY_DIR/scripts/upsert-env.sh\\\" \\\"$DEPLOY_DIR/infrastructure/.env\\\" METRICS_API_TOKEN \\\"\$METRICS_API_TOKEN_VALUE\\\"\"; else printf '%s\\n' 'METRICS_API_TOKEN secret not set; keeping existing infrastructure token.'; fi",
              "if [ -n \"$METRICS_API_TOKEN_B64\" ] && [ -n \"$VPS_METRICS_URL_B64\" ]; then touch \"$DEPLOY_DIR/control-panel/.env.local\" && chown \"$DEPLOY_USER\":\"$DEPLOY_USER\" \"$DEPLOY_DIR/control-panel/.env.local\"; VPS_METRICS_URL_VALUE=\$(printf '%s' '$VPS_METRICS_URL_B64' | base64 -d); VPS_METRICS_TOKEN_VALUE=\$(printf '%s' '$METRICS_API_TOKEN_B64' | base64 -d); su - \"$DEPLOY_USER\" -c \"bash \\\"$DEPLOY_DIR/scripts/upsert-env.sh\\\" \\\"$DEPLOY_DIR/control-panel/.env.local\\\" VPS_METRICS_URL \\\"\$VPS_METRICS_URL_VALUE\\\" && bash \\\"$DEPLOY_DIR/scripts/upsert-env.sh\\\" \\\"$DEPLOY_DIR/control-panel/.env.local\\\" VPS_METRICS_TOKEN \\\"\$VPS_METRICS_TOKEN_VALUE\\\"\"; else printf '%s\\n' 'METRICS_API_TOKEN secret not set; skipping control-panel metrics env sync.'; fi",
              "mkdir -p \"$DEPLOY_DIR/infrastructure/letsencrypt\"",
              "touch \"$DEPLOY_DIR/infrastructure/letsencrypt/acme.json\"",
              "chmod 600 \"$DEPLOY_DIR/infrastructure/letsencrypt/acme.json\"",
              "chown \"$DEPLOY_USER\":\"$DEPLOY_USER\" \"$DEPLOY_DIR/infrastructure/letsencrypt/acme.json\"",
              "su - \"$DEPLOY_USER\" -c \"bash \\\"$DEPLOY_DIR/scripts/migrate-traefik.sh\\\"\"",
              "docker rm -f nginx-proxy-manager >/dev/null 2>&1 || true",
              "docker compose -f \"$DEPLOY_DIR/infrastructure/docker-compose.yml\" --env-file \"$DEPLOY_DIR/infrastructure/.env\" config >/dev/null",
              "docker compose -f \"$DEPLOY_DIR/infrastructure/docker-compose.yml\" --env-file \"$DEPLOY_DIR/infrastructure/.env\" up -d --remove-orphans",
              "if [ -n \"$CONTROL_PANEL_RESTART_COMMAND_B64\" ]; then CONTROL_PANEL_RESTART_COMMAND_VALUE=\$(printf '%s' '$CONTROL_PANEL_RESTART_COMMAND_B64' | base64 -d); su - \"$DEPLOY_USER\" -c \"\$CONTROL_PANEL_RESTART_COMMAND_VALUE\"; else printf '%s\\n' 'CONTROL_PANEL_RESTART_COMMAND secret not set; skipped control-panel restart.'; fi",
              "docker image prune -f"
            ]
          }
          JSON
          )"

          COMMAND_ID="$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy orchestrator from GitHub Actions" \
            --timeout-seconds 1800 \
            --parameters "$SSM_PARAMETERS" \
            --query 'Command.CommandId' \
            --output text)"

          printf 'Started SSM command: %s\n' "$COMMAND_ID"

          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" || true

          STATUS="$(aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'Status' \
            --output text)"

          printf 'SSM command status: %s\n' "$STATUS"
          printf '%s\n' '---- SSM stdout ----'
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'StandardOutputContent' \
            --output text || true
          printf '%s\n' '---- SSM stderr ----'
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'StandardErrorContent' \
            --output text || true

          if [ "$STATUS" != "Success" ]; then
            exit 1
          fi
