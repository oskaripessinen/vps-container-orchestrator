name: Build And Deploy App From UI

on:
  workflow_dispatch:
    inputs:
      app_slug:
        description: "App slug (apps/<app-slug>)"
        required: true
        type: string
      source_owner:
        description: "GitHub repo owner"
        required: true
        type: string
      source_repo:
        description: "GitHub repo name"
        required: true
        type: string
      source_ref:
        description: "Git ref (branch/tag/sha)"
        required: true
        type: string
      internal_port:
        description: "App internal container port"
        required: true
        type: string
      env_vars_base64:
        description: "Optional base64 encoded KEY=VALUE env lines"
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-app-${{ inputs.app_slug }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      SOURCE_GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
      APP_SLUG: ${{ inputs.app_slug }}
      SOURCE_OWNER: ${{ inputs.source_owner }}
      SOURCE_REPO: ${{ inputs.source_repo }}
      SOURCE_REF: ${{ inputs.source_ref }}
      INTERNAL_PORT: ${{ inputs.internal_port }}
      ENV_VARS_BASE64: ${{ inputs.env_vars_base64 }}
    steps:
      - name: Validate workflow inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$APP_SLUG" =~ ^[a-z0-9-]+$ ]]; then
            printf 'Invalid app slug: %s\n' "$APP_SLUG"
            exit 1
          fi

          if [[ ! "$SOURCE_OWNER" =~ ^[A-Za-z0-9_.-]+$ ]]; then
            printf 'Invalid source owner: %s\n' "$SOURCE_OWNER"
            exit 1
          fi

          if [[ ! "$SOURCE_REPO" =~ ^[A-Za-z0-9_.-]+$ ]]; then
            printf 'Invalid source repo: %s\n' "$SOURCE_REPO"
            exit 1
          fi

          if [[ -z "$SOURCE_REF" ]]; then
            printf 'Source ref is required\n'
            exit 1
          fi

          if [[ ! "$INTERNAL_PORT" =~ ^[0-9]+$ ]] || [ "$INTERNAL_PORT" -lt 1 ] || [ "$INTERNAL_PORT" -gt 65535 ]; then
            printf 'Invalid internal port: %s\n' "$INTERNAL_PORT"
            exit 1
          fi

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_OWNER }}/${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
          path: source-repo

      - name: Detect deploy strategy
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t COMPOSE_MATCHES < <(python3 -c $'import os\n\ncompose_names = ["docker-compose.yml", "docker-compose.yaml", "compose.yml", "compose.yaml"]\npriority = {name: index for index, name in enumerate(compose_names)}\nmatches = []\nfor root, dirs, files in os.walk("source-repo"):\n    dirs[:] = [directory for directory in dirs if directory not in {".git", "node_modules"}]\n    for filename in files:\n        if filename in priority:\n            matches.append(os.path.join(root, filename))\n\nmatches.sort(key=lambda path: (path.count(os.sep), priority[os.path.basename(path)], path))\n\nfor path in matches:\n    print(path)')

          if [ "${#COMPOSE_MATCHES[@]}" -gt 0 ]; then
            COMPOSE_FILE_PATH="${COMPOSE_MATCHES[0]#source-repo/}"
            PUBLIC_SERVICE_NAME="$(ruby -ryaml -e '
              preferred = %w[api app web backend server frontend]
              config = YAML.load_file(ARGV[0]) || {}
              services = config["services"]
              abort("Missing services in compose file") unless services.is_a?(Hash) && !services.empty?
              names = services.keys.map(&:to_s)
              puts(preferred.find { |name| names.include?(name) } || names.first)
            ' "${COMPOSE_MATCHES[0]}")"

            printf 'DEPLOY_STRATEGY=compose\n' >> "$GITHUB_ENV"
            printf 'COMPOSE_FILE_PATH=%s\n' "$COMPOSE_FILE_PATH" >> "$GITHUB_ENV"
            printf 'PUBLIC_SERVICE_NAME=%s\n' "$PUBLIC_SERVICE_NAME" >> "$GITHUB_ENV"
            printf 'Using compose deploy strategy with %s (public service: %s)\n' "$COMPOSE_FILE_PATH" "$PUBLIC_SERVICE_NAME"
          else
            printf 'DEPLOY_STRATEGY=dockerfile\n' >> "$GITHUB_ENV"
            printf 'Using Dockerfile deploy strategy\n'
          fi

      - name: Prepare image name
        shell: bash
        run: |
          set -euo pipefail

          if [ "${DEPLOY_STRATEGY:-dockerfile}" = "compose" ]; then
            printf 'Skipping image name generation for compose deploy.\n'
            exit 0
          fi

          IMAGE_REPO="${SOURCE_OWNER}-${SOURCE_REPO}"
          IMAGE_REPO="$(printf '%s' "$IMAGE_REPO" | tr '[:upper:]' '[:lower:]' | tr '._' '--')"
          IMAGE_TAG="deploy-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          APP_IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${IMAGE_REPO}:${IMAGE_TAG}"

          printf 'APP_IMAGE=%s\n' "$APP_IMAGE" >> "$GITHUB_ENV"
          printf 'Building image: %s\n' "$APP_IMAGE"

      - name: Log in to GHCR
        shell: bash
        run: |
          set -euo pipefail

          if [ "${DEPLOY_STRATEGY:-dockerfile}" = "compose" ]; then
            printf 'Skipping GHCR login for compose deploy.\n'
            exit 0
          fi

          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        shell: bash
        run: |
          set -euo pipefail

          if [ "${DEPLOY_STRATEGY:-dockerfile}" = "compose" ]; then
            printf 'Skipping image build for compose deploy.\n'
            exit 0
          fi

          DOCKERFILE_PATH="source-repo/Dockerfile"

          if [ ! -f "$DOCKERFILE_PATH" ]; then
            mapfile -t DOCKERFILE_MATCHES < <(python3 -c $'import os\n\nmatches = []\nfor root, dirs, files in os.walk("source-repo"):\n    dirs[:] = [directory for directory in dirs if directory not in {".git", "node_modules"}]\n    if "Dockerfile" in files:\n        matches.append(os.path.join(root, "Dockerfile"))\n\nmatches.sort(key=lambda path: (path.count(os.sep), path))\n\nfor path in matches:\n    print(path)'
            )

            if [ "${#DOCKERFILE_MATCHES[@]}" -eq 0 ]; then
              printf 'Missing Dockerfile. Searched source-repo root and subdirectories.\n'
              exit 1
            fi

            DOCKERFILE_PATH="${DOCKERFILE_MATCHES[0]}"
            printf 'Using discovered Dockerfile: %s\n' "$DOCKERFILE_PATH"
          fi

          docker build -f "$DOCKERFILE_PATH" -t "$APP_IMAGE" source-repo
          docker push "$APP_IMAGE"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy app through AWS SSM
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "$AWS_REGION" ] || [ -z "$EC2_INSTANCE_ID" ]; then
            printf 'Missing AWS_REGION or EC2_INSTANCE_ID secret.\n'
            exit 1
          fi

          export APP_SLUG APP_IMAGE INTERNAL_PORT DEPLOY_STRATEGY COMPOSE_FILE_PATH PUBLIC_SERVICE_NAME SOURCE_OWNER SOURCE_REPO SOURCE_REF SOURCE_GITHUB_TOKEN ENV_VARS_BASE64

          SSM_PARAMETERS="$(python3 <<'PY'
          import json
          import os

          app_slug = os.environ["APP_SLUG"]
          internal_port = os.environ["INTERNAL_PORT"]
          deploy_strategy = os.environ.get("DEPLOY_STRATEGY", "dockerfile")
          app_image = os.environ.get("APP_IMAGE", "")
          compose_file_path = os.environ.get("COMPOSE_FILE_PATH", "")
          public_service_name = os.environ.get("PUBLIC_SERVICE_NAME", "")
          env_vars_base64 = os.environ.get("ENV_VARS_BASE64", "")
          source_owner = os.environ["SOURCE_OWNER"]
          source_repo = os.environ["SOURCE_REPO"]
          source_ref = os.environ["SOURCE_REF"]
          source_github_token = os.environ.get("SOURCE_GITHUB_TOKEN", "")
          source_github_token_b64 = ""

          if source_github_token:
              import base64
              source_github_token_b64 = base64.b64encode(source_github_token.encode()).decode()

          commands = [
              'set -eu',
              'if [ -d /home/ubuntu/deploy-hub ]; then DEPLOY_DIR=/home/ubuntu/deploy-hub; DEPLOY_USER=ubuntu; elif [ -d /home/ec2-user/deploy-hub ]; then DEPLOY_DIR=/home/ec2-user/deploy-hub; DEPLOY_USER=ec2-user; else echo Missing deploy-hub directory under /home/ubuntu or /home/ec2-user; exit 1; fi',
              'if [ ! -d "$DEPLOY_DIR/.git" ]; then echo Missing git repo at $DEPLOY_DIR; exit 1; fi',
              'su - "$DEPLOY_USER" -c "cd \"$DEPLOY_DIR\" && git fetch origin main && git checkout main && git pull --ff-only origin main"',
          ]

          if deploy_strategy == "compose":
              commands.append(
                  f'''SOURCE_GITHUB_TOKEN_VALUE=$(printf '%s' '{source_github_token_b64}' | base64 -d); su - "$DEPLOY_USER" -c "SOURCE_GITHUB_TOKEN=\"$SOURCE_GITHUB_TOKEN_VALUE\" bash \"$DEPLOY_DIR/scripts/deploy-app-from-source.sh\" {app_slug!r} {source_owner!r} {source_repo!r} {source_ref!r} {compose_file_path!r} {internal_port!r} {public_service_name!r} {env_vars_base64!r}"'''
              )
          else:
              commands.append(
                  f'''su - "$DEPLOY_USER" -c "bash \"$DEPLOY_DIR/scripts/deploy-app-from-image.sh\" {app_slug!r} {app_image!r} {internal_port!r} {env_vars_base64!r}"'''
              )

          print(json.dumps({"commands": commands}))
          PY
          )"

          COMMAND_ID="$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Build and deploy app ${APP_SLUG} from ${SOURCE_OWNER}/${SOURCE_REPO}@${SOURCE_REF}" \
            --timeout-seconds 1800 \
            --parameters "$SSM_PARAMETERS" \
            --query 'Command.CommandId' \
            --output text)"

          printf 'Started SSM command: %s\n' "$COMMAND_ID"

          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" || true

          STATUS="$(aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'Status' \
            --output text)"

          printf 'SSM command status: %s\n' "$STATUS"
          printf '%s\n' '---- SSM stdout ----'
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'StandardOutputContent' \
            --output text || true
          printf '%s\n' '---- SSM stderr ----'
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'StandardErrorContent' \
            --output text || true

          if [ "$STATUS" != "Success" ]; then
            exit 1
          fi
