services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=${TZ:-UTC}
    command:
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=vps-container-orchestrator
      - --entryPoints.web.address=:80
      - --entryPoints.websecure.address=:443
      - --entryPoints.web.http.redirections.entryPoint.to=websecure
      - --entryPoints.web.http.redirections.entryPoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - shared-network

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --interval
      - ${WATCHTOWER_INTERVAL:-300}
      - --cleanup
      - --label-enable
    networks:
      - shared-network

  vps-metrics-api:
    build:
      context: ./vps-metrics-api
    container_name: vps-metrics-api
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - PORT=8787
      - METRICS_API_TOKEN=${METRICS_API_TOKEN}
      - METRICS_CACHE_MS=${METRICS_CACHE_MS:-2000}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "traefik.docker.network=vps-container-orchestrator"
      - "traefik.http.routers.metrics.rule=Host(`metrics.${BASE_DOMAIN}`)"
      - "traefik.http.routers.metrics.entrypoints=websecure"
      - "traefik.http.routers.metrics.tls.certresolver=letsencrypt"
      - "traefik.http.routers.metrics.service=metrics"
      - "traefik.http.services.metrics.loadbalancer.server.port=8787"
    networks:
      - shared-network

networks:
  shared-network:
    name: vps-container-orchestrator
