services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - shared-network

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --interval
      - ${WATCHTOWER_INTERVAL:-300}
      - --cleanup
      - --label-enable
    networks:
      - shared-network

  vps-metrics-api:
    build:
      context: ./vps-metrics-api
    container_name: vps-metrics-api
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - PORT=8787
      - METRICS_API_TOKEN=${METRICS_API_TOKEN}
      - METRICS_CACHE_MS=${METRICS_CACHE_MS:-2000}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - com.centurylinklabs.watchtower.enable=true
    networks:
      - shared-network

networks:
  shared-network:
    name: vps-container-orchestrator
